global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/http_*.json'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance 
      - target_label: __address__
        replacement: "blackbox:9115"

  - job_name: 'blackbox_icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/icmp*.json'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance 
      - target_label: __address__
        replacement: "blackbox:9115"

  - job_name: 'blackbox_https'
    metrics_path: /probe
    params:
      module: [https_2xx]
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/https_*.json'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance 
      - target_label: __address__
        replacement: "blackbox:9115"

